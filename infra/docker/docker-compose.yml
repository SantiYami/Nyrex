version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nyrex_postgres
    environment:
      POSTGRES_USER: ${NYREX_DB_USER:-nyrex}
      POSTGRES_PASSWORD: ${NYREX_DB_PASSWORD:-nyrex_password}
      POSTGRES_DB: ${NYREX_DB_NAME:-nyrex_dev}
    ports:
      - "${NYREX_DB_PORT:-5432}:5432"
    volumes:
      - nyrex_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  nyrex_pgdata:
